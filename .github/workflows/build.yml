name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Caché de Gradle (acelera compilaciones sucesivas)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # 4. Dar permisos de ejecución al gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. Compilar APK debug (listo para instalar y testear)
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 6. Subir el APK como artifact descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AyudaMayor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30  # disponible 30 días para descargar
